name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          mkdir -p dist/MobIntel
          rsync -av --exclude='.git' \
                    --exclude='.github' \
                    --exclude='.idea' \
                    --exclude='.vscode' \
                    . dist/MobIntel/
          cd dist
          zip -r MobIntel-${{ steps.version.outputs.VERSION }}.zip MobIntel/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MobIntel-${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true
